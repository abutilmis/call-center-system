{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="dashboard-wrapper">
    <!-- Form Header -->
    <div class="d-flex align-items-center mb-5 p-4 bg-white rounded-4 shadow-sm">
        <div class="stat-icon-square bg-primary-soft me-3">
            <i class="fas fa-bullhorn"></i>
        </div>
        <div>
            <h2 class="fw-bold mb-0">{% if form.instance.pk %}Edit{% else %}New{% endif %} Announcement</h2>
            <p class="text-muted mb-0">Post a new announcement to be displayed on the system dashboard.</p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="activity-card">
        <form method="post" class="p-2">
            {% csrf_token %}
            
            <div class="row g-4 mb-4">
                <div class="col-md-12">
                    <div class="form-group mb-0">
                        <label class="form-label fw-bold text-muted small ps-2">ANNOUNCEMENT TITLE</label>
                        {{ form.title }}
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-12">
                    <div class="form-group mb-0">
                        <label class="form-label fw-bold text-muted small ps-2">DESCRIPTION / MESSAGE</label>
                        {{ form.description }}
                    </div>
                </div>
            </div>

            <!-- Form Actions -->
            <div class="d-flex gap-3 justify-content-end border-top pt-4">
                <a href="{% url 'announcement_list' %}" class="btn btn-light rounded-pill px-5 py-2">Cancel</a>
                <button type="submit" class="btn btn-primary rounded-pill px-5 py-2 fw-bold">
                    <i class="fas fa-paper-plane me-2"></i>Post Announcement
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
