{% extends 'base.html' %}
{% block content %}
<div class="dashboard-wrapper">
    <div class="activity-card p-5 border-0 shadow-sm rounded-4 text-center mx-auto mt-5" style="max-width: 600px;">
        <i class="fas fa-bullhorn fa-4x text-danger opacity-75 mb-4"></i>
        <h3 class="fw-bold mb-3">Delete Announcement?</h3>
        <p class="text-muted mb-4">Are you sure you want to permanently delete the announcement "<strong class="text-dark">{{ announcement.title }}</strong>"? This action cannot be undone.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3 mt-4">
                <a href="{% url 'announcement_list' %}" class="btn btn-light rounded-pill px-5 py-2 fw-bold">Cancel</a>
                <button type="submit" class="btn btn-danger rounded-pill px-5 py-2 fw-bold"><i class="fas fa-trash me-2"></i>Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
