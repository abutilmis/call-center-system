{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<style>
    /* Professional Layout & Centering */
    body {
        background-color: #f8f9fa;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 1.5rem;
    }

    /* Strict Centering Overrides */
    .container.mt-5 {
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .register-container {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        border-radius: 1.25rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        padding: 2.5rem;
        margin: auto; /* Added for strict centering */
        animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .register-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .register-header .logo {
        height: 36px;
        width: auto;
        margin-bottom: 1.25rem;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .register-header h2 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #111827;
    }

    .register-header p {
        color: #6b7280;
        font-size: 0.95rem;
    }

    .input-group-custom {
        margin-bottom: 1.25rem;
    }

    .input-group-custom label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #374151;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 1.1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #9ca3af;
        font-size: 0.9rem;
    }

    .input-wrapper input {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.85rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        font-size: 0.95rem;
        transition: all 0.2s;
        background-color: #f9fafb;
    }

    .input-wrapper input:focus {
        outline: none;
        border-color: #3170b5;
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(49, 112, 181, 0.1);
    }

    .btn-register {
        width: 100%;
        padding: 0.85rem;
        background-color: #3170b5;
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 1rem;
    }

    .btn-register:hover {
        background-color: #255a91;
        transform: translateY(-1px);
    }

    .form-footer {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.9rem;
        color: #6b7280;
    }

    .form-footer a {
        color: #3170b5;
        font-weight: 700;
        text-decoration: none;
    }

    .form-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="register-container">
    <div class="register-header">
        <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo" onerror="this.style.display='none'">
        <h2>Create Account</h2>
        <p>Join our professional call center network.</p>
    </div>

    <form method="post" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="input-group-custom">
            <label for="username">Username</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" id="username" placeholder="Choose a username" required autofocus>
            </div>
        </div>

        <div class="input-group-custom">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" id="email" placeholder="name@example.com" required>
            </div>
        </div>

        <div class="input-group-custom">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password1" id="password" placeholder="Create a password" required>
            </div>
        </div>

        <div class="input-group-custom">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-check-circle"></i>
                <input type="password" name="password2" id="confirm-password" placeholder="Confirm your password" required>
            </div>
        </div>

        <button type="submit" class="btn-register">Sign Up</button>
    </form>

    <div class="form-footer">
        Already have an account? <a href="{% url 'login' %}">Log in</a>
    </div>
</div>

<script>
    // Always show day theme as per user preference
    document.body.classList.remove('dark-mode');
</script>
{% endblock %}
