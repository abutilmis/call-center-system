{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-grid">
            <!-- Left: Welcome & Illustration -->
            <div class="login-hero">
                <div class="hero-inner">
                    <h2 class="hero-title">Create Account</h2>
                    <p class="hero-subtitle">Join our call center management system</p>
                </div>
                <img src="{% static 'images/home-page.png' %}" alt="Welcome illustration" class="hero-illustration" onerror="this.style.display='none'">
            </div>

            <!-- Right: Registration Form -->
            <div class="login-form-container">
                <div class="login-form-card">
                    <div class="form-logo">
                        <img src="{% static 'images/logo.png' %}" alt="Logo" onerror="this.style.display='none'">
                    </div>
                    <h3 class="form-title">Sign Up</h3>
                    <form method="post" action="{% url 'register' %}" class="brand-form">
                        {% csrf_token %}
                        <!-- Username -->
                        <div class="form-group">
                            <label for="id_username">Username</label>
                            <div class="input-group">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" name="username" id="id_username" class="form-control" placeholder="Choose a username" required autofocus>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="form-group">
                            <label for="id_email">Email</label>
                            <div class="input-group">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" name="email" id="id_email" class="form-control" placeholder="Your email address" required>
                            </div>
                        </div>

                        <!-- Password1 -->
                        <div class="form-group">
                            <label for="id_password1">Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" name="password1" id="id_password1" class="form-control" placeholder="Enter a secure password" required>
                            </div>
                        </div>

                        <!-- Password2 -->
                        <div class="form-group">
                            <label for="id_password2">Confirm Password</label>
                            <div class="input-group">
                                <i class="fas fa-check-circle input-icon"></i>
                                <input type="password" name="password2" id="id_password2" class="form-control" placeholder="Confirm your password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">Register</button>
                    </form>

                    <div class="form-footer">
                        <span class="text-muted">Already have an account?</span>
                        <a href="{% url 'login' %}" class="link-primary">Log in</a>
                    </div>
                    <div class="login-footer">
                        <p>&copy; {% now "Y" %} All rights reserved.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
