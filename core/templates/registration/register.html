{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-grid">
            <!-- Left: Welcome & Illustration -->
            <div class="login-hero">
                <div class="hero-inner">
                    <div class="hero-logo">
                        <img src="{% static 'images/logo.png' %}" alt="Logo" onerror="this.style.display='none'">
                    </div>
                    <div class="system-name">CCMS</div>
                    <h2 class="hero-title">Create Account</h2>
                    <p class="hero-subtitle">Join us to manage call center operations</p>
                </div>
                <i class="fas fa-user-plus hero-illustration" style="font-size: 120px; opacity: 0.2;"></i>
            </div>

            <!-- Right: Registration Form -->
            <div class="login-form-container">
                <div class="login-form-card">
                    <div class="form-logo text-center mb-3">
                        <i class="fas fa-phone-alt fa-2x" style="color: var(--primary);"></i>
                    </div>
                    <h3 class="form-title text-center">Register</h3>
                    <form method="post" action="{% url 'register' %}" class="brand-form">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                    </form>

                    <div class="form-footer text-center mt-3">
                        <span class="text-muted">Already have an account?</span>
                        <a href="{% url 'login' %}" class="link-primary">Log in</a>
                    </div>
                    <div class="login-footer text-center mt-4">
                        <p>&copy; {% now "Y" %} Call Center Management System</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
