{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-grid">
            <!-- Left: Welcome & Illustration -->
            <div class="login-hero">
                <div class="hero-inner">
                    <h2 class="hero-title">Welcome back</h2>
                    <p class="hero-subtitle">Sign in to continue managing the call center</p>
                </div>
                <!-- FontAwesome icon instead of image -->
                <i class="fas fa-headset hero-illustration" style="font-size: 120px; opacity: 0.2;"></i>
            </div>

            <!-- Right: Login Form -->
            <div class="login-form-container">
                <div class="login-form-card">
                    <div class="form-logo text-center mb-3">
                        <i class="fas fa-phone-alt fa-2x" style="color: var(--primary);"></i>
                    </div>
                    <h3 class="form-title text-center">Login</h3>
                    <form method="post" action="{% url 'login' %}" class="brand-form">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="username">Username</label>
                            <div class="input-group">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="form-check">
                                <input type="checkbox" id="remember" name="remember" class="form-check-input">
                                <span class="form-check-label">Remember me</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">Log In</button>
                    </form>

                    <div class="form-footer text-center mt-3">
                        <span class="text-muted">Don't have an account?</span>
                        <a href="{% url 'register' %}" class="link-primary">Create one</a>
                    </div>
                    <div class="login-footer text-center mt-4">
                        <p>&copy; {% now "Y" %}. All rights reserved.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
