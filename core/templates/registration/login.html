{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-grid">
            <!-- Left column: illustration and welcome text -->
            <div class="login-hero">
                <div class="hero-inner">
                    <div class="hero-logo">
                        <img src="{% static 'images/logo.png' %}" alt="Logo" onerror="this.style.display='none'">
                    </div>
                    <h2 class="hero-title">Welcome back</h2>
                    <p class="hero-subtitle">Sign in to continue managing your call center</p>
                </div>
                <img src="{% static 'images/home-page.png' %}" alt="Illustration" class="hero-illustration" onerror="this.style.display='none'">
            </div>

            <!-- Right column: login form -->
            <div class="login-form-container">
                <div class="login-form-card">
                    <div class="form-logo">
                        <img src="{% static 'images/logo.png' %}" alt="Logo" onerror="this.style.display='none'">
                    </div>
                    <h3 class="form-title">Log in</h3>
                    <form method="post" action="{% url 'login' %}" class="brand-form">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="id_username">Username</label>
                            <div class="input-group">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" required autofocus>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="id_password">Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" required>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="form-check">
                                <input type="checkbox" id="remember" name="remember" class="form-check-input">
                                <span class="form-check-label">Remember me</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">Log In</button>
                    </form>

                    <div class="form-footer">
                        <span class="text-muted">Don't have an account?</span>
                        <a href="{% url 'register' %}" class="link-primary">Create one</a>
                    </div>
                    <div class="login-footer">
                        <p>&copy; {% now "Y" %} Call Center Management System</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
