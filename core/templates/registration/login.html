{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-grid">
            <!-- Left hero section -->
            <div class="login-hero">
                <div class="hero-inner">
                    <div class="hero-logo">
                        <img src="{% static 'images/logo.png' %}" alt="Logo" onerror="this.style.display='none'">
                    </div>
                    <div class="system-name">CCMS</div>
                    <h2 class="hero-title">Call Center<br>Management System</h2>
                    <p class="hero-subtitle">Streamline corrections, knowledge, and announcements</p>
                </div>
                <div class="hero-illustration">
                    <i class="fas fa-headset"></i>
                </div>
            </div>

            <!-- Right form container -->
            <div class="login-form-container">
                <div class="login-form-card">
                    <div class="form-logo text-center mb-3">
                        <img src="{% static 'images/logo-small.png' %}" alt="Logo" onerror="this.style.display='none'">
                    </div>
                    <h3 class="form-title">Welcome Back</h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="id_username">Username</label>
                            <div class="input-group">
                                <span class="input-icon"><i class="fas fa-user"></i></span>
                                <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="id_password">Password</label>
                            <div class="input-group">
                                <span class="input-icon"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" required>
                            </div>
                        </div>
                        <div class="form-options">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <!-- Optional: add "Forgot password?" link later -->
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Login</button>
                    </form>
                    <div class="form-footer">
                        Don't have an account?
                        <a href="{% url 'register' %}" class="link-primary">Register now</a>
                    </div>
                    <div class="login-footer">
                        &copy; {% now "Y" %} Call Center Management System
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
