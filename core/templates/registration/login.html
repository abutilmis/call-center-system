{% extends 'auth_base.html' %}
{% load static %}

{% block content %}
<style>
    /* Professional Layout & Centering */
    body {
        background-color: #f8f9fa;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 1.5rem;
    }

    /* Strict Centering Overrides */
    .container.mt-5 {
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .login-container {
        width: 100%;
        max-width: 820px;
        background: #ffffff;
        border-radius: 1.25rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        display: flex;
        min-height: 480px;
        margin: auto; /* Added for strict centering */
        animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Balanced Columns */
    .login-hero {
        flex: 1;
        background: #3170b5;
        padding: 2.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
    }

    .login-hero h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-top: 1.5rem;
        color: #ffffff;
        z-index: 2;
    }

    .hero-image {
        width: 100%;
        max-width: 320px;
        height: auto;
        opacity: 0.5;
        z-index: 1;
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.1));
    }

    .login-form-side {
        flex: 1;
        padding: 2.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: white;
    }

    /* Centered Branding Content */
    .form-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .form-logo {
        height: 36px;
        width: auto;
        margin-bottom: 1.25rem;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .form-header h2 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #111827;
    }

    .form-header p {
        color: #6b7280;
        font-size: 0.95rem;
    }

    .input-group-custom {
        margin-bottom: 1.25rem;
    }

    .input-group-custom label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #374151;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 1.1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #9ca3af;
        font-size: 0.9rem;
    }

    .input-wrapper input {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.85rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        font-size: 0.95rem;
        transition: all 0.2s;
        background-color: #f9fafb;
    }

    .input-wrapper input:focus {
        outline: none;
        border-color: #3170b5;
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(49, 112, 181, 0.1);
    }

    .form-options {
        display: flex;
        align-items: center;
        margin-bottom: 1.5rem;
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
    }

    .checkbox-group input {
        width: 1rem;
        height: 1rem;
        accent-color: #3170b5;
        cursor: pointer;
    }

    .checkbox-group label {
        font-size: 0.85rem;
        color: #4b5563;
        margin: 0;
        cursor: pointer;
    }

    .btn-login {
        width: 100%;
        padding: 0.85rem;
        background-color: #3170b5;
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-login:hover {
        background-color: #255a91;
        transform: translateY(-1px);
    }

    .form-footer {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.9rem;
        color: #6b7280;
    }

    .form-footer a {
        color: #3170b5;
        font-weight: 700;
        text-decoration: none;
    }

    .form-footer a:hover {
        text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .login-container {
            flex-direction: column;
            max-width: 450px;
            min-height: auto;
        }
        .login-hero {
            padding: 2rem;
        }
        .hero-image {
            max-width: 200px;
        }
        .login-form-side {
            padding: 2rem 1.5rem;
        }
    }
</style>

<div class="login-container">
    <div class="login-hero">
        <img src="{% static 'images/home-page.png' %}" alt="Decoration" class="hero-image" onerror="this.style.display='none'">
        <h1>Welcome back</h1>
    </div>

    <div class="login-form-side">
        <div class="form-header">
            <img src="{% static 'images/logo.png' %}" alt="Logo" class="form-logo" onerror="this.style.display='none'">
            <h2>Log in</h2>
            <p>Access your professional dashboard</p>
        </div>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="input-group-custom">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" id="username" placeholder="Username" required autofocus>
                </div>
            </div>

            <div class="input-group-custom">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-options">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
            </div>

            <button type="submit" class="btn-login">Log In</button>
        </form>

        <div class="form-footer">
            Don't have an account? <a href="{% url 'register' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
