{% extends 'base.html' %}
{% load static %}

{% block content %}
<h2>{{ title }}</h2>
<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-6">
            <div class="mb-3">
                <label class="form-label">Entity Type</label>
                {{ form.entity_type }}
            </div>
        </div>
    </div>

    <!-- Common fields -->
    <div class="row">
        <div class="col-md-6">
            <div class="mb-3">
                <label class="form-label">Name</label>
                {{ form.name }}
            </div>
        </div>
        <div class="col-md-6">
            <div class="mb-3">
                <label class="form-label">Primary Phone</label>
                {{ form.phone }}
            </div>
        </div>
    </div>

    <!-- Agency-specific fields (hidden by default) -->
    <div id="agencyFields" style="display: none;">
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">Secondary Phone</label>
                    {{ form.phone2 }}
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">City</label>
                    {{ form.city }}
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">Woreda</label>
                    {{ form.woreda }}
                </div>
            </div>
        </div>
    </div>

    <!-- TVET/OCSS fields (hidden by default) -->
    <div id="tvetOcssFields" style="display: none;">
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">Registration ID</label>
                    {{ form.registration_id }}
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">Location</label>
                    {{ form.location }}
                </div>
            </div>
        </div>
    </div>

    <!-- Additional info -->
    <div class="mb-3">
        <label class="form-label">Additional Info (JSON)</label>
        {{ form.additional_info }}
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'entity_list' %}" class="btn btn-secondary">Cancel</a>
</form>

<script>
    const entityTypeSelect = document.getElementById('id_entity_type');
    const agencyDiv = document.getElementById('agencyFields');
    const tvetOcssDiv = document.getElementById('tvetOcssFields');

    function toggleFields() {
        const selected = entityTypeSelect.value;
        if (selected === 'agency') {
            agencyDiv.style.display = 'block';
            tvetOcssDiv.style.display = 'none';
        } else if (selected === 'tvet' || selected === 'ocss') {
            agencyDiv.style.display = 'none';
            tvetOcssDiv.style.display = 'block';
        } else {
            agencyDiv.style.display = 'none';
            tvetOcssDiv.style.display = 'none';
        }
    }

    entityTypeSelect.addEventListener('change', toggleFields);
    toggleFields(); // initial call
</script>
{% endblock %}
