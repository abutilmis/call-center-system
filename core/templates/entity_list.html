{% extends 'base.html' %}
{% block content %}
<h2>Entities</h2>
<div class="mb-3">
    <form method="get" class="d-flex">
        <input type="text" name="q" class="form-control me-2" placeholder="Search by name, phone, location" value="{{ query }}">
        <button type="submit" class="btn btn-primary">Search</button>
        <a href="{% url 'entity_create' %}" class="btn btn-success ms-2">Add Entity</a>
    </form>
</div>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Phone</th>
            <th>Location</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for entity in entities %}
        <tr>
            <td>{{ entity.name }}</td>
            <td>{{ entity.get_entity_type_display }}</td>
            <td>{{ entity.phone }}</td>
            <td>{{ entity.location }}</td>
            <td>
                <a href="{% url 'entity_update' entity.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'entity_delete' entity.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5">No entities found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
